<div class="mx-auto max-w-7xl px-3 py-3.5 pt-18">
   <main class="min-w-0">
      <div class="space-y-4">
         <button (click)="goBack()"
            class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50">`Back</button>
         <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div class="h-48 bg-[linear-gradient(112deg,#0f172a_0%,#1e3a5f_36%,#2b5178_72%,#5f8fb8_100%)]"></div>
            <div class="relative -mt-14 px-3 pb-5 sm:px-5">
               <div
                  class="flex flex-wrap items-end justify-between gap-4 rounded-2xl border border-white/70 bg-white/95 p-4">
                  <div class="flex items-end gap-3">
                     <img [alt]="userProfile.user.name"
                        class="h-20 w-20 rounded-full border-4 border-white object-cover shadow-sm sm:h-24 sm:w-24"
                        [src]="userProfile.user.photo">
                     <div>
                        <p class="text-xl font-black text-slate-900 sm:text-2xl">{{userProfile.user.name}}</p>
                        <p class="text-sm font-semibold text-slate-500 sm:text-base">@{{userProfile.user.username}}</p>
                     </div>
                  </div>
                  @if (!userProfile.isFollowing) {
                  <button type="button" (click)="followUnFullowUser(userProfile.user._id)"
                     class="inline-flex w-full items-center justify-center gap-2 rounded px-4 py-2 text-sm font-extrabold transition sm:w-auto bg-[#1877f2] text-white hover:bg-[#166fe5]">
                     <i class="fa-solid fa-user-plus"></i>@if (loadingFollow) {
                        Following...
                     }@else {
                        Follow
                     }</button>
                  }@else{
                  <button type="button" (click)="followUnFullowUser(userProfile.user._id)"
                     class="inline-flex w-full items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-extrabold transition sm:w-auto border border-slate-300 bg-white text-slate-700 hover:bg-slate-100"><i class="fa-solid fa-check"></i>@if (loadingFollow) {Updating...}@else{Following}</button>
                  }
               </div>
            </div>
         </section>
         <section class="space-y-3">
           @if (nastedPosts.length) {
             @for (post of nastedPosts; track post._id) {
            <app-post [post]="post" [mainUser]="mainUser" (like)="likeUnLike($event)" (bookmark)="saveUnsave($event)"></app-post>
            }
           }@else {
            <div class=" w-full h-fullS py-15 rounded bg-white">
               <p class="text-center font-semibold text-slate-600">No posts</p>
            </div>
           }
         </section>
      </div>
   </main>
</div>
